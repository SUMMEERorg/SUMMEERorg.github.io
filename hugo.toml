  avatarURL = "/images/SUMMEER_LOGO.png"
  avatarAltText = "SUMMEER"
  avatarSize = "size-m"
  showBackToTopButton = true
  customHeadHTML = '''
<link rel="icon" type="image/png" href="/images/SUMMEER_LOGO.png">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">



