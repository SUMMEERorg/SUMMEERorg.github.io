<div class="news-list">
  {{ range first 5 (where site.RegularPages "Section" "news") }}
    <article class="news-item">
      <p>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </p>
      {{ end }}

      {{ with .Summary }}
        <p>{{ . }}</p>
      {{ end }}
    </article>
  {{ end }}
</div>
